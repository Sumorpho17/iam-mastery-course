<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IAM Mastery" />
  <meta name="theme-color" content="#080c14" />
  <meta name="description" content="IAM Mastery — 12-Week Professional Identity & Access Management Course. Master AD, Entra ID, AWS IAM, Zero Trust, and AI Agent Identity." />
  <title>IAM Mastery — 12-Week Professional Course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #080c14;
      --bg-panel: #0a1020;
      --bg-card: rgba(15,23,42,0.8);
      --border: #1e2d4a;
      --border-hover: #334155;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-dim: #475569;
      --text-faint: #334155;
      --accent: #06b6d4;
      --accent-glow: rgba(6,182,212,0.15);
      --accent-bg: rgba(6,182,212,0.08);
      --accent-bg-hover: rgba(6,182,212,0.12);
      --blue: #93c5fd;
      --green: #6ee7b7;
      --green-bg: rgba(6,78,59,0.1);
      --green-border: rgba(52,211,153,0.2);
      --yellow: #fbbf24;
      --yellow-bg: rgba(120,53,15,0.15);
      --yellow-border: rgba(251,191,36,0.2);
      --concept-border: #1e40af;
      --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
      --font-body: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      --tap-min: 44px;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-panel); }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    /* ═══ TOP BAR ═══ */
    #topbar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    #topbar .left { display: flex; align-items: center; gap: 12px; }
    #topbar .right { display: flex; align-items: center; gap: 16px; }
    .menu-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 18px; padding: 4px;
      min-width: var(--tap-min); min-height: var(--tap-min);
      display: flex; align-items: center; justify-content: center;
    }
    .brand { color: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 2px; }
    .brand-sub { color: var(--text-muted); font-size: 12px; font-family: var(--font-body); }
    .progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .progress-label { color: var(--text-muted); font-size: 11px; font-family: var(--font-body); }
    .progress-track { width: 160px; height: 3px; background: var(--border); border-radius: 2px; }
    .progress-fill { height: 3px; background: linear-gradient(90deg, #06b6d4, #6366f1); border-radius: 2px; transition: width 0.5s ease; }
    .progress-pct { color: var(--accent); font-size: 13px; font-weight: 600; font-family: var(--font-body); }

    /* ═══ LAYOUT ═══ */
    #layout { display: flex; height: calc(100vh - 52px); height: calc(100dvh - 52px); }

    /* ═══ SIDEBAR ═══ */
    #sidebar {
      width: 280px; background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto; flex-shrink: 0;
      transition: margin-left 0.3s ease;
    }
    #sidebar.closed { margin-left: -280px; }
    .week-btn {
      width: 100%; padding: 12px 16px; background: none; border: none;
      border-left: 3px solid transparent; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 8px;
      min-height: var(--tap-min);
    }
    .week-btn.active { background: var(--accent-bg); border-left-color: var(--accent); }
    .week-btn .wk { font-size: 10px; font-weight: 700; color: var(--text-faint); flex-shrink: 0; }
    .week-btn.active .wk { color: var(--accent); }
    .week-btn .wt { font-size: 12px; color: var(--text-dim); font-family: var(--font-body); line-height: 1.3; }
    .week-btn.active .wt { color: var(--text-secondary); }
    .day-btn {
      width: 100%; padding: 8px 16px 8px 36px; background: none; border: none;
      cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px;
      min-height: var(--tap-min);
    }
    .day-btn:active, .week-btn:active { background: var(--accent-bg-hover); }
    .day-btn.active { background: var(--accent-bg-hover); }
    .day-btn .mark { font-size: 10px; color: var(--text-faint); }
    .day-btn .mark.done { color: var(--accent); }
    .day-btn .dt { font-size: 11px; color: var(--text-dim); font-family: var(--font-body); line-height: 1.3; }
    .day-btn.active .dt { color: var(--blue); }

    /* ═══ MAIN CONTENT ═══ */
    #main { flex: 1; overflow-y: auto; }
    .header-area {
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
    }
    .header-crumb { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; letter-spacing: 2px; }
    .header-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; font-family: var(--font-body); }
    .header-theme { font-size: 13px; color: var(--text-muted); font-family: var(--font-body); }

    /* ═══ TABS ═══ */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--bg-panel); padding: 0 24px; overflow-x: auto;
    }
    .tab-btn {
      padding: 12px 14px; background: none; border: none; cursor: pointer;
      font-size: 12px; color: var(--text-dim); border-bottom: 2px solid transparent;
      text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
      white-space: nowrap; min-height: var(--tap-min);
      font-family: var(--font-mono);
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ═══ CONTENT PANELS ═══ */
    .content-area { padding: 24px; max-width: 860px; }
    .concept-card {
      border-left: 3px solid var(--concept-border); background: var(--bg-card);
      padding: 16px 20px; margin-bottom: 16px; border-radius: 4px;
    }
    .concept-label {
      font-size: 11px; background: var(--accent-glow); color: var(--accent);
      padding: 2px 8px; border-radius: 2px; font-family: var(--font-mono);
    }
    .concept-heading {
      font-size: 15px; font-weight: 700; color: var(--blue); margin: 0 0 10px;
      display: flex; align-items: center; gap: 8px; font-family: var(--font-body);
    }
    .concept-body {
      font-size: 13px; color: var(--text-secondary); line-height: 1.8;
      font-family: var(--font-body); white-space: pre-wrap; word-break: break-word;
    }
    .lab-title { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .lab-title h2 { font-size: 18px; font-weight: 700; color: var(--green); font-family: var(--font-body); }
    .lab-hint {
      background: var(--green-bg); border: 1px solid var(--green-border);
      border-radius: 6px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 12px; color: var(--green); font-family: var(--font-body);
    }
    .lab-step { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
    .step-num {
      background: linear-gradient(135deg, #0891b2, #1d4ed8); border-radius: 50%;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 11px; font-weight: 700; color: var(--text-primary);
    }
    .step-text {
      font-size: 13px; color: var(--text-secondary); line-height: 1.7;
      padding-top: 4px; font-family: var(--font-body);
    }
    .step-text.sub { color: var(--text-muted); }
    .res-title { font-size: 18px; font-weight: 700; color: var(--blue); margin-bottom: 20px; font-family: var(--font-body); }
    .res-link {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 10px; text-decoration: none; color: var(--blue);
      min-height: var(--tap-min); transition: border-color 0.2s;
    }
    .res-link:hover, .res-link:active { border-color: var(--border-hover); }
    .res-label { font-size: 13px; font-family: var(--font-body); flex: 1; }
    .res-arrow { color: var(--text-faint); font-size: 12px; }
    .quiz-title { font-size: 18px; font-weight: 700; color: var(--yellow); margin-bottom: 8px; font-family: var(--font-body); }
    .quiz-hint {
      background: var(--yellow-bg); border: 1px solid var(--yellow-border);
      border-radius: 6px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 12px; color: var(--yellow); font-family: var(--font-body);
    }
    .quiz-item {
      padding: 16px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 12px;
    }
    .quiz-item .qn { font-weight: 700; color: var(--yellow); font-size: 14px; min-width: 24px; }
    .quiz-item .qt { font-size: 13px; color: var(--text-secondary); line-height: 1.7; font-family: var(--font-body); }
    .quiz-row { display: flex; gap: 12px; }
    .empty-state {
      padding: 32px; text-align: center; color: var(--text-faint);
      font-family: var(--font-body); font-size: 14px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ═══ NAV FOOTER ═══ */
    .nav-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);
      gap: 8px; flex-wrap: wrap;
    }
    .nav-btn {
      padding: 10px 18px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-muted); cursor: pointer;
      font-size: 12px; font-family: var(--font-mono); min-height: var(--tap-min);
      display: flex; align-items: center; transition: border-color 0.2s;
    }
    .nav-btn:hover, .nav-btn:active { border-color: var(--border-hover); }
    .nav-btn.next { background: var(--accent-bg-hover); border-color: var(--accent); color: var(--accent); }
    .nav-btn.complete { border-color: var(--border); }
    .nav-btn.complete.done { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

    /* ═══ RESPONSIVE — iPad Portrait & Smaller ═══ */
    @media (max-width: 820px) {
      #sidebar { position: fixed; left: 0; top: 52px; bottom: 0; z-index: 40; width: 300px; }
      #sidebar.closed { margin-left: -300px; }
      .sidebar-overlay { display: none; position: fixed; inset: 0; top: 52px; background: rgba(0,0,0,0.5); z-index: 35; }
      .sidebar-overlay.show { display: block; }
      .content-area { padding: 20px 16px; }
      .header-area { padding: 16px; }
      .tabs { padding: 0 12px; }
      .progress-track { width: 100px; }
      .brand-sub { display: none; }
    }

    @media (max-width: 480px) {
      .progress-wrap { display: none; }
      .nav-footer { justify-content: center; }
    }
  </style>
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div id="topbar">
  <div class="left">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar">☰</button>
    <span class="brand">IAM MASTERY</span>
    <span style="color:var(--text-faint);font-size:12px">|</span>
    <span class="brand-sub">12-Week Professional Course</span>
  </div>
  <div class="right">
    <div class="progress-wrap">
      <span class="progress-label" id="progressLabel">0/0 days completed</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>
</div>

<!-- ═══ LAYOUT ═══ -->
<div id="layout">
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
  <nav id="sidebar"></nav>
  <div id="main"></div>
</div>

<!-- ═══ COURSE DATA (loaded from external file) ═══ -->
<script src="courseData.js"></script>

<script>
// ═══ STATE ═══
let activeWeek = 0;
let activeDay = 0;
let activeTab = 'learn';
let sidebarOpen = window.innerWidth > 820;
let completed = JSON.parse(localStorage.getItem('iam-progress') || '{}');

// ═══ HELPERS ═══
const $ = id => document.getElementById(id);
const totalDays = () => courseData.reduce((s, w) => s + w.days.length, 0);
const completedCount = () => Object.values(completed).filter(Boolean).length;
const key = () => `${activeWeek}-${activeDay}`;
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function saveProgress() {
  localStorage.setItem('iam-progress', JSON.stringify(completed));
  updateProgressBar();
}

function updateProgressBar() {
  const total = totalDays();
  const done = completedCount();
  const pct = total ? Math.round((done / total) * 100) : 0;
  $('progressLabel').textContent = `${done}/${total} days completed`;
  $('progressFill').style.width = `${pct}%`;
  $('progressPct').textContent = `${pct}%`;
}

// ═══ SIDEBAR ═══
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  $('sidebar').classList.toggle('closed', !sidebarOpen);
  $('overlay').classList.toggle('show', sidebarOpen && window.innerWidth <= 820);
}

function renderSidebar() {
  let html = '';
  courseData.forEach((w, wi) => {
    const isActive = wi === activeWeek;
    html += `<button class="week-btn${isActive?' active':''}" onclick="selectWeek(${wi})">
      <span class="wk">W${w.week}</span>
      <span class="wt">${esc(w.title)}</span>
    </button>`;
    if (isActive) {
      w.days.forEach((d, di) => {
        const isDayActive = di === activeDay;
        const isDone = completed[`${wi}-${di}`];
        html += `<button class="day-btn${isDayActive?' active':''}" onclick="selectDay(${di})">
          <span class="mark${isDone?' done':''}">${isDone?'✓':'○'}</span>
          <span class="dt">Day ${d.day}: ${esc(d.title)}</span>
        </button>`;
      });
    }
  });
  $('sidebar').innerHTML = html;
  $('sidebar').classList.toggle('closed', !sidebarOpen);
}

function selectWeek(wi) { activeWeek = wi; activeDay = 0; activeTab = 'learn'; render(); }
function selectDay(di) {
  activeDay = di; activeTab = 'learn'; render();
  if (window.innerWidth <= 820) toggleSidebar();
}

// ═══ MAIN CONTENT ═══
function renderMain() {
  const week = courseData[activeWeek];
  const day = week?.days[activeDay];
  if (!day) { $('main').innerHTML = '<div class="empty-state"><div class="icon">📚</div>Select a day to begin</div>'; return; }

  let html = `
    <div class="header-area">
      <div class="header-crumb">WEEK ${week.week} / DAY ${day.day}</div>
      <div class="header-title">${esc(day.title)}</div>
      <div class="header-theme">${esc(week.theme)}</div>
    </div>
    <div class="tabs">
      ${['learn','lab','resources','quiz'].map(t =>
        `<button class="tab-btn${activeTab===t?' active':''}" onclick="switchTab('${t}')">
          ${t==='learn'?'📖 Learn':t==='lab'?'🔬 Lab':t==='resources'?'🔗 Resources':'❓ Quiz'}
        </button>`
      ).join('')}
    </div>
    <div class="content-area">${renderTabContent(day)}</div>`;
  $('main').innerHTML = html;
  $('main').scrollTop = 0;
}

function switchTab(t) { activeTab = t; renderMain(); }

function renderTabContent(day) {
  if (activeTab === 'learn') return renderLearn(day);
  if (activeTab === 'lab') return renderLab(day);
  if (activeTab === 'resources') return renderResources(day);
  if (activeTab === 'quiz') return renderQuiz(day);
  return '';
}

function renderLearn(day) {
  if (!day.concepts || !day.concepts.length) {
    return `<div class="empty-state"><div class="icon">🔬</div>This day is lab & implementation focused. Head to the Lab tab.</div>`;
  }
  return day.concepts.map((c, i) =>
    `<div class="concept-card">
      <div class="concept-heading">
        <span class="concept-label">CONCEPT ${i+1}</span> ${esc(c.heading)}
      </div>
      <div class="concept-body">${esc(c.body)}</div>
    </div>`
  ).join('');
}

function renderLab(day) {
  if (!day.lab) return `<div class="empty-state"><div class="icon">📖</div>No lab for this session.</div>`;
  return `
    <div class="lab-title"><span style="font-size:20px">🔬</span><h2>${esc(day.lab.title)}</h2></div>
    <div class="lab-hint">💡 Document everything as you go. Screenshots + explanations = portfolio evidence.</div>
    ${day.lab.steps.map((s, i) =>
      `<div class="lab-step">
        <div class="step-num">${i+1}</div>
        <div class="step-text${s.startsWith('  ')?' sub':''}">${esc(s)}</div>
      </div>`
    ).join('')}`;
}

function renderResources(day) {
  if (!day.resources || !day.resources.length) {
    return `<div class="empty-state">Resources are embedded within the lesson content.</div>`;
  }
  return `<div class="res-title">📚 Study Resources</div>` +
    day.resources.map(r =>
      `<a class="res-link" href="${r.url}" target="_blank" rel="noopener noreferrer">
        <span style="font-size:16px">🔗</span>
        <span class="res-label">${esc(r.label)}</span>
        <span class="res-arrow">↗</span>
      </a>`
    ).join('');
}

function renderQuiz(day) {
  if (!day.quiz || !day.quiz.length) {
    return `<div class="empty-state">This is an implementation session. Reflect on what you built.</div>`;
  }
  return `
    <div class="quiz-title">❓ Self-Check Questions</div>
    <div class="quiz-hint">Answer these from memory before checking your notes. These are real interview question patterns.</div>
    ${day.quiz.map((q, i) =>
      `<div class="quiz-item"><div class="quiz-row">
        <span class="qn">${i+1}.</span>
        <span class="qt">${esc(q)}</span>
      </div></div>`
    ).join('')}`;
}

// ═══ NAVIGATION ═══
function nextDay() {
  const week = courseData[activeWeek];
  if (activeDay < week.days.length - 1) activeDay++;
  else if (activeWeek < courseData.length - 1) { activeWeek++; activeDay = 0; }
  activeTab = 'learn'; render();
}

function prevDay() {
  if (activeDay > 0) activeDay--;
  else if (activeWeek > 0) { activeWeek--; activeDay = courseData[activeWeek].days.length - 1; }
  activeTab = 'learn'; render();
}

function toggleComplete() {
  const k = key();
  completed[k] = !completed[k];
  saveProgress(); render();
}

// ═══ RENDER ═══
function render() {
  renderSidebar();
  renderMain();
  // Append nav footer to content area
  const ca = document.querySelector('.content-area');
  if (ca) {
    const isDone = completed[key()];
    ca.insertAdjacentHTML('beforeend', `
      <div class="nav-footer">
        <button class="nav-btn" onclick="prevDay()">← PREV DAY</button>
        <button class="nav-btn complete${isDone?' done':''}" onclick="toggleComplete()">
          ${isDone ? '✓ COMPLETED' : 'MARK COMPLETE'}
        </button>
        <button class="nav-btn next" onclick="nextDay()">NEXT DAY →</button>
      </div>`);
  }
  updateProgressBar();
}

// ═══ INIT ═══
window.addEventListener('resize', () => {
  if (window.innerWidth > 820) {
    $('overlay').classList.remove('show');
  }
});

// Touch swipe support for iPad
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 80) {
    const mainEl = $('main');
    if (mainEl && mainEl.contains(e.target)) {
      if (dx > 0) prevDay(); else nextDay();
    }
  }
}, {passive:true});

render();
</script>
</body>
</html>
